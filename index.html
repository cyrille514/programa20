<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta obligatoria para activar la responsividad nativa y el giro automático en móviles -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depurador de Arreglos Estricto con Lógica Main</title>
    <!-- Importación oficial de Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @import "tailwindcss";
      @layer base {
         :root {
          @apply text-base sm:text-lg;
           line-height: 1.6;
         }
      }
    </style>
</head>
<body class="bg-[#4B5694] bg-cover bg-center bg-no-repeat w-full min-h-screen flex items-center justify-center p-2 sm:p-6 md:p-12 select-none font-sans text-gray-900 antialiased">

    <!-- CONTENEDOR 'MAIN' PANORÁMICO GIGANTE (w-full para móviles, max-w-3xl para PC) -->
    <main class="bg-[#F0E76F] p-5 sm:p-10 md:p-14 w-full max-w-xl min-h-[500px] flex flex-col justify-between border-2 border-slate-200 rounded-3xl shadow-2xl text-center transition-all duration-300">
        
        <div class="w-full">
            <header class="text-center mb-6 sm:mb-8">
                <h1 class="text-2xl sm:text-2xl font-black text-black mb-8 tracking-tight uppercase">Depurador de Arreglos</h1>
            
            <!-- Formulario Panorámico Puro controlado de forma reactiva por JS -->
            <form id="validador-form" class="space-y-8" novalidate>
                <div class="text-left w-full">
                    <label for="input-elementos" class="block text-sm font-black text-slate-700 mb-4  tracking-wide">
                        Introduce elementos separados por comas (letras, números o booleanos):
                    </label>
                    <input 
                        type="text" 
                        id="input-elementos" 
                        placeholder='Ej. "x", 10, "x", 2, "10", 10, true, true' 
                        required
                        autocomplete="off"
                        class="w-full px-6 py-4 border-2 border-slate-300 rounded-2xl text-slate-800 font-normal text-xl sm:text-2xl focus:ring-4 focus:ring-blue-400 focus:border-blue-500 outline-none transition-all bg-gray-50/50 shadow-inner break-all"
                    >
                </div>

                <button 
                    type="submit" 
                    class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-black py-5 px-8 rounded-2xl transition-all duration-200 cursor-pointer shadow-md active:scale-98 text-center text-xl tracking-widest uppercase"
                >
                    Limpiar Arreglo
                </button>
            </form>
        </div>

        <!-- Ficha de Resultados Dinámica de Alto Contraste (Oculta por defecto con 'hidden') -->
        <div id="resultado-validacion" class="hidden mt-8 p-6 rounded-2xl font-mono border-4 bg-slate-950 text-white border-slate-800 shadow-2xl max-w-full overflow-hidden text-left">
            <p class="text-xs text-slate-400 uppercase tracking-widest font-bold mb-3 border-b border-slate-800 pb-2">Objeto Recibido y Mostrado por Main:</p>
            <!-- Aquí se inyectará el formato de arreglo limpio devuelto por la función lógica -->
            <p id="texto-objeto" class="text-base sm:text-2xl font-black text-emerald-400 tracking-wide break-all"></p>
        </div>

    </main>

    <!-- ÚNICA VINCULACIÓN JAVASCRIPT AL FINAL DEL CUERPO -->
    <script src="./js/app.js"></script>
</body>
</html>
